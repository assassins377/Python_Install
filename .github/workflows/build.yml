name: Build & Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: windows-latest
    steps:
    - name: Скачиваем код
      uses: actions/checkout@v4

    - name: Устанавливаем Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Устанавливаем зависимости
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Запускаем тесты
      run: python -m pytest tests/ -v --tb=short

  build:
    needs: test
    runs-on: windows-latest
    steps:
    - name: Скачиваем код
      uses: actions/checkout@v4

    - name: Устанавливаем 32-битный Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        architecture: 'x86'

    - name: Устанавливаем библиотеки
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Компилируем MInstAll.exe
      run: |
        pyinstaller --clean --noconsole --onefile --name MInstAll_x86 --icon=icons/system.png main.py

    - name: Загружаем артефакт
      uses: actions/upload-artifact@v4
      with:
        name: MInstAll_x86_Executable
        path: dist/MInstAll_x86.exe
