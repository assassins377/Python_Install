name: Build & Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Скачиваем код
      uses: actions/checkout@v4

    - name: Устанавливаем Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Устанавливаем ruff
      run: |
        python -m pip install --upgrade pip
        pip install ruff

    - name: Проверяем линтером
      run: ruff check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
    - name: Скачиваем код
      uses: actions/checkout@v4

    - name: Устанавливаем Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Устанавливаем mypy
      run: |
        python -m pip install --upgrade pip
        pip install mypy

    - name: Проверяем типами
      run: mypy --ignore-missing-imports .

  security:
    runs-on: ubuntu-latest
    steps:
    - name: Скачиваем код
      uses: actions/checkout@v4

    - name: Устанавливаем Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Устанавливаем bandit
      run: |
        python -m pip install --upgrade pip
        pip install bandit

    - name: Сканируем безопасность
      run: bandit -r . -x ./tests,./tools,./.venv,./build,./dist -ll

  test:
    # Тесты гоняем на обеих ОС: проект — кросс-платформенный (Windows + Linux),
    # и платформенная логика (диспетчеризация команд, фильтрация по ОС)
    # ведёт себя по-разному. Юнит-тесты не требуют wxPython — ставим минимум.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - name: Скачиваем код
      uses: actions/checkout@v4

    - name: Устанавливаем Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Устанавливаем зависимости
      run: |
        python -m pip install --upgrade pip
        pip install psutil pytest pytest-cov

    - name: Запускаем тесты с покрытием
      run: python -m pytest tests/ -v --tb=short --cov --cov-report=term-missing --cov-report=xml

    - name: Проверяем порог покрытия
      run: python -m coverage report --fail-under=40

    - name: Загружаем отчёт о покрытии (Linux)
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: coverage-xml
        path: coverage.xml

  build:
    needs: [lint, typecheck, security, test]
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86
            python-arch: x86
          - arch: x64
            python-arch: x64
    name: Build ${{ matrix.arch }}
    steps:
    - name: Скачиваем код
      uses: actions/checkout@v4

    - name: Устанавливаем ${{ matrix.arch }} Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        architecture: ${{ matrix.python-arch }}

    - name: Устанавливаем библиотеки
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pillow
        pip install -r requirements.txt

    - name: Компилируем MInstAll_${{ matrix.arch }}.exe
      run: |
        pyinstaller --clean --noconsole --onefile --uac-admin --name MInstAll_${{ matrix.arch }} --icon=icons/system.png main.py

    - name: Загружаем артефакт
      uses: actions/upload-artifact@v4
      with:
        name: MInstAll_${{ matrix.arch }}_Executable
        path: dist/MInstAll_${{ matrix.arch }}.exe
